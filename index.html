<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Sincronizador de Tempo</title>
    <!-- Standalone / PWA Meta tags for native app look on mobile devices -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cronômetro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#020617" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="root"></div>

    <!-- High-performance CSS Splash Loader (persists for exactly 3 seconds during start) -->
    <div id="splash-loader" style="
      position: fixed;
      inset: 0;
      background-color: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f8fafc;
      overflow: hidden;
      transition: opacity 500ms cubic-bezier(0.4, 0, 0.2, 1);
    ">
      <!-- Background glows -->
      <div style="
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: rgba(79, 70, 229, 0.12);
        filter: blur(80px);
        top: 25%;
        left: 25%;
        pointer-events: none;
      "></div>
      <div style="
        position: absolute;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: rgba(16, 185, 129, 0.08);
        filter: blur(80px);
        bottom: 25%;
        right: 25%;
        pointer-events: none;
      "></div>

      <!-- Glowing Clock Icon -->
      <div style="
        position: relative;
        width: 72px;
        height: 72px;
        border: 4px solid #4f46e5;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
        animation: splash-pulse 2s infinite ease-in-out;
        margin-bottom: 24px;
      ">
        <!-- Clock Hands -->
        <div style="
          position: absolute;
          width: 4px;
          height: 22px;
          background-color: #10b981;
          border-radius: 2px;
          bottom: 50%;
          transform-origin: bottom center;
          animation: splash-spin-slow 8s linear infinite;
        "></div>
        <div style="
          position: absolute;
          width: 3px;
          height: 16px;
          background-color: #4f46e5;
          border-radius: 2px;
          bottom: 50%;
          transform-origin: bottom center;
          animation: splash-spin-fast 1.5s linear infinite;
        "></div>
        <!-- Clock Center -->
        <div style="
          position: absolute;
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background-color: #10b981;
        "></div>
      </div>

      <!-- Branding Text -->
      <h1 style="
        font-size: 40px;
        font-weight: 900;
        letter-spacing: 0.2em;
        margin: 0;
        padding-left: 0.2em;
        background: linear-gradient(135deg, #818cf8 0%, #10b981 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      ">SINC</h1>
      
      <!-- Tiny separator -->
      <div style="
        height: 1px;
        width: 48px;
        background: gradient;
        background-image: linear-gradient(to right, transparent, #4f46e5, transparent);
        margin: 10px 0;
      "></div>
      
      <p style="
        font-size: 11px;
        font-weight: 300;
        letter-spacing: 0.05em;
        margin: 0;
        color: #94a3b8;
        max-width: 250px;
        text-align: center;
        line-height: 1.4;
      ">Sincronização profissional de reuniões em tempo real</p>

      <!-- Loading spinner and small state text -->
      <div style="
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 48px;
        opacity: 0.7;
      ">
        <div style="
          width: 14px;
          height: 14px;
          border: 2px solid #ffffff;
          border-top-color: transparent;
          border-radius: 50%;
          animation: splash-spin-fast 0.8s linear infinite;
        "></div>
        <span style="font-size: 11px; font-weight: 500; letter-spacing: 0.05em; color: #cbd5e1; font-family: monospace;">Iniciando portal...</span>
      </div>
    </div>

    <style>
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(79, 70, 229, 0.3); }
        50% { transform: scale(1.05); box-shadow: 0 0 35px rgba(16, 185, 129, 0.5); }
      }
      @keyframes splash-spin-slow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes splash-spin-fast {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>

    <script>
      // Garante que a splash screen fique visivel por exatamente 3 segundos antes do fade-out
      setTimeout(function() {
        var loader = document.getElementById('splash-loader');
        if (loader) {
          loader.style.opacity = '0';
          setTimeout(function() {
            if (loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 500);
        }
      }, 3000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
